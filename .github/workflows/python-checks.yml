name: Python Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Black formatting
            command: black
            allow_failure: false
          - name: Ruff linting
            command: ruff
            allow_failure: false
          - name: Mypy type check
            command: mypy
            allow_failure: false
          - name: Mypy strict type check
            command: mypy-strict
            allow_failure: true
          - name: Glean parser check
            command: check_glean
            allow_failure: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.8'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test environment
        run: |
          cp .env-dist .env
          mkdir -p job-results
          mkdir -p staticfiles/accounts/profile
          mkdir -p frontend/out/accounts/profile
          touch frontend/out/accounts/profile/index.html
          touch staticfiles/accounts/profile/index.html

      - name: Run ${{ matrix.check.name }}
        id: run_check
        continue-on-error: ${{ matrix.check.allow_failure }}
        env:
          DJANGO_SETTINGS_MODULE: privaterelay.settings
          DATABASE_URL: sqlite:///db.sqlite3
          DATABASE_ENGINE: sqlite
          PHONES_ENABLED: 1
          MYPY_STRICT: ${{ matrix.check.command == 'mypy-strict' && '1' || '0' }}
          TEST_RESULTS_DIR: job-results
          TEST_RESULTS_FILENAME: ${{ matrix.check.command }}.xml
        run: |
          source .github/workflows/python/python_job.bash
          run_command ${{ matrix.check.command == 'mypy-strict' && 'mypy' || matrix.check.command }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.check.command }}-results
          path: job-results/*.xml
          retention-days: 7

  pytest-matrix:
    name: pytest - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          # Main test configurations
          - name: PostgreSQL 17.7
            test_results_filename: pytest-postgres-17-7.xml
            python_version: '3.11.8'
            postgres_version: '17.7'
            phones_enabled: '1'
            allow_failure: false
            pytest_args: ''

          - name: Phones disabled
            test_results_filename: pytest-phones-disabled.xml
            python_version: '3.11.8'
            postgres_version: null
            phones_enabled: '0'
            allow_failure: false
            pytest_args: ''

          # Migration tests
          - name: SQLite migrations
            test_results_filename: sqlite3-migrations.xml
            python_version: '3.11.8'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: false
            pytest_args: '--reuse-db --maxfail=3'
            migrations_test: true
            db_type: sqlite

          - name: PostgreSQL migrations
            test_results_filename: postgres-migrations.xml
            python_version: '3.11.8'
            postgres_version: '17.7'
            phones_enabled: '1'
            allow_failure: false
            pytest_args: '--reuse-db --maxfail=3'
            migrations_test: true
            db_type: postgres

          # Python version tests
          - name: Python 3.12
            test_results_filename: pytest-python-3-12.xml
            python_version: '3.12.7'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: false
            pytest_args: ''

          - name: Python 3.13
            test_results_filename: pytest-python-3-13.xml
            python_version: '3.13'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: true
            pytest_args: '--maxfail=3'

    services:
      postgres:
        image: ${{ matrix.test.postgres_version && format('postgres:{0}', matrix.test.postgres_version) || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.test.python_version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update dependency
        if: matrix.test.update_dependency
        run: pip install --pre --upgrade "${{ matrix.test.update_dependency }}"

      - name: Install sqlite3 (for migrations test)
        if: matrix.test.migrations_test && matrix.test.db_type == 'sqlite'
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Create test environment
        run: |
          cp .env-dist .env
          mkdir -p staticfiles/accounts/profile
          mkdir -p frontend/out/accounts/profile
          touch frontend/out/accounts/profile/index.html
          touch staticfiles/accounts/profile/index.html
          mkdir -p job-results

      - name: Set database URL
        id: set_db
        run: |
          if [ -n "${{ matrix.test.postgres_version }}" ]; then
            echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/relay_test" >> $GITHUB_ENV
            echo "TEST_DB_NAME=test_relay_test" >> $GITHUB_ENV
            echo "TEST_DB_URL=postgresql://postgres:postgres@localhost:5432/test_relay_test" >> $GITHUB_ENV
            echo "DATABASE_ENGINE=postgres" >> $GITHUB_ENV
          else
            echo "DATABASE_URL=sqlite:///db.sqlite3" >> $GITHUB_ENV
            echo "TEST_DB_NAME=test.sqlite3" >> $GITHUB_ENV
            echo "TEST_DB_URL=sqlite:///test.sqlite3" >> $GITHUB_ENV
            echo "DATABASE_ENGINE=sqlite" >> $GITHUB_ENV
          fi

      - name: Run migrations test (create initial DB)
        if: matrix.test.migrations_test
        env:
          PHONES_ENABLED: ${{ matrix.test.phones_enabled }}
        run: |
          pytest --create-db ${{ matrix.test.pytest_args }} .

      - name: Show migrations (before)
        if: matrix.test.migrations_test
        run: |
          source .github/workflows/python/python_job.bash
          show_migrations

      - name: Switch to production for migrations test
        if: matrix.test.migrations_test
        run: |
          source .github/workflows/python/python_job.bash
          switch_to_production

      - name: Run pytest
        id: pytest
        continue-on-error: ${{ matrix.test.allow_failure }}
        env:
          PHONES_ENABLED: ${{ matrix.test.phones_enabled }}
        run: |
          pytest \
            ${{ matrix.test.pytest_args }} \
            --junitxml=job-results/${{ matrix.test.test_results_filename }} \
            .

      - name: Show migrations (after)
        if: matrix.test.migrations_test
        run: |
          source .github/workflows/python/python_job.bash
          show_migrations

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test.test_results_filename }}-results
          path: job-results/*.xml
          retention-days: 7

      - name: Mark as allowed failure
        if: matrix.test.allow_failure && steps.pytest.outcome == 'failure'
        run: echo "Test failed but failure is allowed"
