name: Python Quality Checks

# TODO: Remove .circleci/python_job.bash fallback after migration is in production
# All script sourcing currently checks both .github/workflows/python/python_job.bash
# and .circleci/python_job.bash for backwards compatibility with production tag

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker:
    name: Build Docker Image for Python Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fx-private-relay:python-checks
          outputs: type=docker,dest=/tmp/docker-image.tar
          cache-from: type=gha,scope=python-checks
          cache-to: type=gha,mode=max,scope=python-checks
          build-args: |
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_SERVER_URL=${{ github.server_url }}
            GIT_BRANCH=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-python-checks
          path: /tmp/docker-image.tar
          retention-days: 1

  code-quality:
    name: ${{ matrix.check.name }}
    needs: build-docker
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Black formatting
            command: black
            allow_failure: false
          - name: Ruff linting
            command: ruff
            allow_failure: false
          - name: Mypy type check
            command: mypy
            allow_failure: false
          - name: Mypy strict type check
            command: mypy-strict
            allow_failure: true
          - name: Glean parser check
            command: check_glean
            allow_failure: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-python-checks
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/docker-image.tar

      - name: Run ${{ matrix.check.name }}
        id: run_check
        continue-on-error: ${{ matrix.check.allow_failure }}
        run: |
          # Create a volume to hold test results, owned by the app user (10001:10001)
          docker run \
            --volume /tmp/test-results \
            --name test-results-volume \
            alpine \
            /bin/sh -c "chmod 0777 /tmp/test-results && chown 10001:10001 /tmp/test-results"

          # Determine the actual command to run
          if [ "${{ matrix.check.command }}" = "mypy-strict" ]; then
            ACTUAL_COMMAND="mypy"
            MYPY_STRICT=1
          else
            ACTUAL_COMMAND="${{ matrix.check.command }}"
            MYPY_STRICT=0
          fi

          # Run the check
          set +e
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            --volumes-from test-results-volume \
            -e DJANGO_SETTINGS_MODULE=privaterelay.settings \
            -e DATABASE_URL=sqlite:///db.sqlite3 \
            -e DATABASE_ENGINE=sqlite \
            -e PHONES_ENABLED=1 \
            -e MYPY_STRICT=${MYPY_STRICT} \
            -e TEST_RESULTS_DIR=/tmp/test-results \
            -e TEST_RESULTS_FILENAME=${{ matrix.check.command }}.xml \
            fx-private-relay:python-checks \
            -c "if [ -f .github/workflows/python/python_job.bash ]; then
                  source .github/workflows/python/python_job.bash
                else
                  source .circleci/python_job.bash
                fi
                run_command ${ACTUAL_COMMAND}"
          CHECK_STATUS=$?
          set -e

          # Copy results to local disk
          mkdir -p ./job-results
          docker cp test-results-volume:/tmp/test-results/. ./job-results/ 2>/dev/null || true

          # Clean up volume
          docker rm test-results-volume

          # Exit with check status
          exit $CHECK_STATUS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.check.command }}-results
          path: job-results/*.xml
          retention-days: 7

  pytest-matrix:
    name: pytest - ${{ matrix.test.name }}
    needs: build-docker
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          # Example DB test configuration, can be run when we look to upgrade the DB
          # - name: PostgreSQL 17.7
          #   test_results_filename: pytest-postgres-17-7.xml
          #   python_version: '3.11.8'
          #   postgres_version: '17.7'
          #   phones_enabled: '1'
          #   allow_failure: false
          #   pytest_args: ''

          - name: Phones disabled
            test_results_filename: pytest-phones-disabled.xml
            python_version: '3.11.8'
            postgres_version: null
            phones_enabled: '0'
            allow_failure: false
            pytest_args: ''

          # Migration tests
          - name: SQLite migrations
            test_results_filename: sqlite3-migrations.xml
            python_version: '3.11.8'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: false
            pytest_args: '--reuse-db --maxfail=3'
            migrations_test: true
            db_type: sqlite

          - name: PostgreSQL migrations
            test_results_filename: postgres-migrations.xml
            python_version: '3.11.8'
            postgres_version: '17.7'
            phones_enabled: '1'
            allow_failure: false
            pytest_args: '--reuse-db --maxfail=3'
            migrations_test: true
            db_type: postgres

          # Python version tests
          - name: Python 3.12
            test_results_filename: pytest-python-3-12.xml
            python_version: '3.12.7'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: false
            pytest_args: ''

          - name: Python 3.13
            test_results_filename: pytest-python-3-13.xml
            python_version: '3.13'
            postgres_version: null
            phones_enabled: '1'
            allow_failure: true
            pytest_args: '--maxfail=3'

          # Django version test
          # - name: Django 6.0 compatibility
          #   test_results_filename: pytest-django-6-0.xml
          #   python_version: '3.11.8'
          #   postgres_version: null
          #   phones_enabled: '1'
          #   allow_failure: true
          #   pytest_args: '--maxfail=3'
          #   update_dependency: 'Django>=6.0,<6.1'

    services:
      postgres:
        image: ${{ matrix.test.postgres_version && format('postgres:{0}', matrix.test.postgres_version) || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-python-checks
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/docker-image.tar

      - name: Build Python ${{ matrix.test.python_version }} image if needed
        if: matrix.test.python_version != '3.11.8'
        run: |
          # For non-default Python versions, build a custom image
          cat > Dockerfile.test <<EOF
          FROM python:${{ matrix.test.python_version }}

          RUN pip install --no-cache --upgrade pip

          RUN groupadd --gid 10001 app && \\
              useradd -g app --uid 10001 --shell /usr/sbin/nologin --create-home --home-dir /app app

          WORKDIR /app
          USER app

          COPY --chown=app ./requirements.txt /app/requirements.txt
          RUN pip install --no-cache -r requirements.txt
          COPY --chown=app . /app
          RUN ln --symbolic /app/privaterelay/locales/fy-NL/ privaterelay/locales/fy
          RUN ln --symbolic /app/privaterelay/locales/sv-SE/ privaterelay/locales/sv
          RUN ln --symbolic /app/privaterelay/locales/pt-BR/ privaterelay/locales/pt
          RUN ln --symbolic /app/privaterelay/locales/es-ES/ privaterelay/locales/es
          COPY --chown=app .env-dist /app/.env
          EOF

          docker build -f Dockerfile.test -t fx-private-relay:python-checks .

      - name: Update dependency if specified
        if: matrix.test.update_dependency
        run: |
          # Create a new image with updated dependency
          docker run \
            --name temp-container \
            --entrypoint "/bin/bash" \
            fx-private-relay:python-checks \
            -c "pip install --pre --upgrade '${{ matrix.test.update_dependency }}' && \
                echo 'Dependency updated'"
          docker commit temp-container fx-private-relay:python-checks
          docker rm temp-container

      - name: Set database configuration
        id: set_db
        run: |
          if [ -n "${{ matrix.test.postgres_version }}" ]; then
            echo "DB_TYPE=postgres" >> $GITHUB_ENV
            HOST_IP=$(ip -4 addr show docker0 | grep -Po 'inet \K[\d.]+')
            echo "DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/relay_test" >> $GITHUB_ENV
            echo "TEST_DB_NAME=test_relay_test" >> $GITHUB_ENV
            echo "TEST_DB_URL=postgresql://postgres:postgres@host.docker.internal:5432/test_relay_test" >> $GITHUB_ENV
            echo "DATABASE_ENGINE=postgres" >> $GITHUB_ENV
            echo "HOST_IP=${HOST_IP}" >> $GITHUB_ENV
          else
            echo "DB_TYPE=sqlite" >> $GITHUB_ENV
            echo "DATABASE_URL=sqlite:///db.sqlite3" >> $GITHUB_ENV
            echo "TEST_DB_NAME=test.sqlite3" >> $GITHUB_ENV
            echo "TEST_DB_URL=sqlite:///test.sqlite3" >> $GITHUB_ENV
            echo "DATABASE_ENGINE=sqlite" >> $GITHUB_ENV
            echo "HOST_IP=" >> $GITHUB_ENV
          fi

      - name: Run migrations test (create initial DB)
        if: matrix.test.migrations_test
        run: |
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            ${{ env.DB_TYPE == 'postgres' && format('--add-host=host.docker.internal:{0}', env.HOST_IP) || '' }} \
            -e DATABASE_URL=${{ env.DATABASE_URL }} \
            -e PHONES_ENABLED=${{ matrix.test.phones_enabled }} \
            fx-private-relay:python-checks \
            -c "/app/.local/bin/pytest --create-db ${{ matrix.test.pytest_args }} ."

      - name: Show migrations (before)
        if: matrix.test.migrations_test
        run: |
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            ${{ env.DB_TYPE == 'postgres' && format('--add-host=host.docker.internal:{0}', env.HOST_IP) || '' }} \
            -e DATABASE_URL=${{ env.DATABASE_URL }} \
            fx-private-relay:python-checks \
            -c "if [ -f .github/workflows/python/python_job.bash ]; then
                  source .github/workflows/python/python_job.bash
                else
                  source .circleci/python_job.bash
                fi
                show_migrations"

      - name: Switch to production for migrations test
        if: matrix.test.migrations_test
        run: |
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            ${{ env.DB_TYPE == 'postgres' && format('--add-host=host.docker.internal:{0}', env.HOST_IP) || '' }} \
            -e DATABASE_URL=${{ env.DATABASE_URL }} \
            fx-private-relay:python-checks \
            -c "if [ -f .github/workflows/python/python_job.bash ]; then
                  source .github/workflows/python/python_job.bash
                else
                  source .circleci/python_job.bash
                fi
                switch_to_production"

      - name: Run pytest
        id: pytest
        continue-on-error: ${{ matrix.test.allow_failure }}
        run: |
          # Create a volume to hold test results, owned by the app user (10001:10001)
          docker run \
            --volume /tmp/test-results \
            --name test-results-volume \
            alpine \
            /bin/sh -c "chmod 0777 /tmp/test-results && chown 10001:10001 /tmp/test-results"

          # Run pytest
          set +e
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            --volumes-from test-results-volume \
            ${{ env.DB_TYPE == 'postgres' && format('--add-host=host.docker.internal:{0}', env.HOST_IP) || '' }} \
            -e DATABASE_URL=${{ env.DATABASE_URL }} \
            -e PHONES_ENABLED=${{ matrix.test.phones_enabled }} \
            fx-private-relay:python-checks \
            -c "mkdir -p /tmp/test-results && \
                /app/.local/bin/pytest \
                  ${{ matrix.test.pytest_args }} \
                  --junitxml=/tmp/test-results/${{ matrix.test.test_results_filename }} \
                  ."
          TEST_STATUS=$?
          set -e

          # Copy results to local disk
          mkdir -p ./job-results
          docker cp test-results-volume:/tmp/test-results/. ./job-results/ 2>/dev/null || true

          # Clean up volume
          docker rm test-results-volume

          # Exit with test status
          exit $TEST_STATUS

      - name: Show migrations (after)
        if: matrix.test.migrations_test
        run: |
          docker run \
            --rm \
            --entrypoint "/bin/bash" \
            ${{ env.DB_TYPE == 'postgres' && format('--add-host=host.docker.internal:{0}', env.HOST_IP) || '' }} \
            -e DATABASE_URL=${{ env.DATABASE_URL }} \
            fx-private-relay:python-checks \
            -c "if [ -f .github/workflows/python/python_job.bash ]; then
                  source .github/workflows/python/python_job.bash
                else
                  source .circleci/python_job.bash
                fi
                show_migrations"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test.test_results_filename }}-results
          path: job-results/*.xml
          retention-days: 7

      - name: Mark as allowed failure
        if: matrix.test.allow_failure && steps.pytest.outcome == 'failure'
        run: echo "Test failed but failure is allowed"
