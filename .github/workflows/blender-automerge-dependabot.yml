name: BLEnder Auto-merge Safe Dependabot PRs
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check gates but do not approve or merge)'
        default: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: pip install PyGithub PyYAML packaging

      - name: Auto-merge safe Dependabot PRs
        run: python .github/blender/automerge-dependabot.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
