name: BLEnder Fix Dependabot CI
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
      dry_run:
        description: 'Dry run (show changes, do not push)'
        default: 'true'

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: 'recursive'
          persist-credentials: false

      - name: Checkout PR branch
        run: gh pr checkout ${{ inputs.pr_number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6
        with:
          node-version: '20'

      - name: Install npm deps
        run: cd frontend && npm ci

      - name: Run BLEnder fix
        run: .github/blender/fix-dependabot.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}

      - name: Commit and push fix
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          TREE=$(git write-tree)
          PARENT=$(git rev-parse HEAD)
          COMMIT=$(gh api "repos/${{ github.repository }}/git/commits" \
            --method POST \
            --field "message=fix: auto-fix CI failure from dependency update" \
            --field "tree=${TREE}" \
            --field "parents[]=${PARENT}" \
            --jq '.sha')
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          gh api "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            --field "sha=${COMMIT}"
          echo "Pushed verified commit ${COMMIT}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
