name: BLEnder Fix Dependabot CI
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
      dry_run:
        description: 'Dry run (show changes, do not push)'
        default: 'true'

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: 'recursive'
          persist-credentials: false

      - name: Checkout PR branch
        run: gh pr checkout ${{ inputs.pr_number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sandbox dependencies
        run: sudo apt-get install -y bubblewrap socat

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.111

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Install npm deps
        run: cd frontend && npm ci

      - name: Run BLEnder fix
        run: .github/blender/fix-dependabot.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}

      # Create the commit by having this github action workflow create blob + tree + push via GitHub API.
      #
      # The usual git credentials are unavailable,
      # because we use persist-credentials: false
      # to keep the token out of Claude's environment).
      #
      # This blog + tree + push technique operates via the GitHub API,
      # so the commit is automatically signed and verified by github-actions[bot]. 
      - name: Commit and push fix
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          # Read commit message from Claude, fall back to default
          if [ -f .blender-commit-msg ]; then
            COMMIT_MSG=$(cat .blender-commit-msg)
            rm .blender-commit-msg
          else
            COMMIT_MSG="BLEnder fix: auto-fix CI failure from dependency update"
          fi

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          REPO="${{ github.repository }}"
          PARENT=$(git rev-parse HEAD)
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${PARENT}" --jq '.tree.sha')

          # Upload each changed file as a blob
          TREE_ITEMS="[]"
          for file in $(git diff --name-only); do
            BLOB_SHA=$(base64 -w 0 "$file" | \
              jq -Rs '{"encoding": "base64", "content": .}' | \
              gh api "repos/${REPO}/git/blobs" \
              --method POST \
              --input - \
              --jq '.sha')
            TREE_ITEMS=$(echo "$TREE_ITEMS" | jq \
              --arg path "$file" \
              --arg sha "$BLOB_SHA" \
              '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
          done

          # Create tree from blobs
          TREE_SHA=$(jq -n \
            --arg base "$BASE_TREE" \
            --argjson tree "$TREE_ITEMS" \
            '{"base_tree": $base, "tree": $tree}' | \
            gh api "repos/${REPO}/git/trees" \
              --method POST \
              --input - \
              --jq '.sha')

          # Create verified commit
          COMMIT=$(gh api "repos/${REPO}/git/commits" \
            --method POST \
            --field "message=${COMMIT_MSG}" \
            --field "tree=${TREE_SHA}" \
            --field "parents[]=${PARENT}" \
            --jq '.sha')

          # Update branch ref
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            --field "sha=${COMMIT}"

          echo "Pushed verified commit ${COMMIT}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
